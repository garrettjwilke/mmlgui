name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          base-devel
          git
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-glfw
          mingw-w64-x86_64-libao

    - name: Install libvgm
      shell: msys2 {0}
      run: |
        git clone https://github.com/vgmrips/libvgm.git
        cd libvgm
        mkdir build && cd build
        cmake .. -G "MSYS Makefiles" -D AUDIODRV_LIBAO=OFF -D CMAKE_INSTALL_PREFIX=/mingw64
        make
        make install

    - name: Build mmlgui
      shell: msys2 {0}
      run: |
        make RELEASE=1

    - name: Prepare artifact
      shell: bash
      run: |
        mkdir -p artifact
        cp bin/mmlgui.exe artifact/ || cp bin/mmlgui artifact/

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mmlgui-windows
        path: artifact/*
