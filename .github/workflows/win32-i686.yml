name: CMake Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          base-devel
          git
          cmake
          ninja
          pkg-config
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-glfw
          mingw-w64-x86_64-cppunit
          mingw-w64-x86_64-libao

    - name: Configure with CMake
      shell: msys2 {0}
      run: |
        mkdir -p build && cd build
        cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      shell: msys2 {0}
      run: |
        cd build
        make -j$(nproc)

    - name: Run unit tests
      shell: msys2 {0}
      run: |
        cd build
        ctest --output-on-failure || echo "Unit tests failed"

    - name: Package binary
      shell: bash
      run: |
        mkdir -p artifact
        cp build/mmlgui.exe artifact/ || cp build/mmlgui artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mmlgui-windows
        path: artifact/*
