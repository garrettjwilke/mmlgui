name: Build MMLGUI (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Enables manual triggering from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install vcpkg
      uses: lukka/run-vcpkg@v4
      with:
        vcpkgRoot: ${{ github.workspace }}/vcpkg
        appendedVcpkgTriplet: x64-windows # Or x86-windows if needed
        vcpkgPackages: glfw3 cppunit

    - name: Configure CMake
      shell: bash
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Upload artifacts (optional)
      uses: actions/upload-artifact@v4
      with:
        name: mmlgui-windows
        path: build/Release/mmlgui.exe # Adjust the path to your executable
