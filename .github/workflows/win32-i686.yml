name: Win32 i686

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            base-devel
            git
            mingw-w64-i686-toolchain
            mingw-w64-i686-glfw
            mingw-w64-i686-cppunit
            mingw-w64-i686-cmake

      - name: build-libvgm
        run: |
          git clone -n https://github.com/valleybell/libvgm
          cd libvgm
          git checkout 5fe3883a

          # Patch CMakeLists.txt to work with modern CMake
          sed -i 's/cmake_minimum_required(VERSION 2.8)/cmake_minimum_required(VERSION 3.5)/' CMakeLists.txt

          mkdir build
          cd build
          cmake .. -G "MSYS Makefiles" -D AUDIODRV_LIBAO=OFF -D CMAKE_INSTALL_PREFIX=/mingw32
          make
          make install


      - name: init-submodules
        run: |
          git submodule update --init --recursive

      - name: make
        run: |
          make bin/mmlgui RELEASE=1

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: bin/mmlgui.exe
