name: Build MMLGUI (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      # You can specify the architecture if needed, e.g.,
      # with:
      #   arch: x64

    - name: Install dependencies
      run: |
        # You might need to install vcpkg and integrate it with CMake
        # For example:
        # choco install vcpkg --confirm
        # vcpkg integrate install

        # Install necessary packages using vcpkg (if you use it)
        # vcpkg install glfw3 cppunit glew # If GLEW is needed by imgui-opengl3

        # Alternatively, if you have pre-built libraries or other methods:
        echo "Installing or locating dependencies..."
        # This step will depend heavily on how you manage your dependencies.
        # Consider using vcpkg, Conan, or providing pre-built binaries.
        # For GLFW, you might download a pre-built binary and extract it.

    - name: Configure CMake
      shell: bash
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DGLFW3_DIR="path/to/glfw3/cmake/folder" # Adjust this path
        # If you are using vcpkg, CMake should automatically find GLFW3.
        # If not, you might need to point CMake to the GLFW3 installation.
        # Similarly for CPPUNIT if not found automatically.

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Upload artifacts (optional)
      uses: actions/upload-artifact@v3
      with:
        name: mmlgui-windows
        path: build/Release/mmlgui.exe # Adjust the path to your executable
